<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キミは○○JIN ジェネレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#0f0a00;color:#f5e6c0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem}
.ttl{text-align:center;margin-bottom:2rem}
.ttl h1{font-size:1.9rem;font-weight:900;background:linear-gradient(135deg,#fffacc,#ffd700 40%,#e8a000 70%,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem}
.ttl p{font-size:.85rem;color:#a08858}
.steps{display:flex;gap:6px;width:100%;max-width:520px;margin-bottom:1.25rem}
.step{flex:1;text-align:center;font-size:.68rem;padding:5px 2px;border-radius:6px;border:1px solid #3d2e10;color:#a08858;background:#1e1508;transition:all .2s}
.step.on{border-color:#d4a017;color:#d4a017;background:#1e1500}
.step.ok{border-color:#3d8a30;color:#6ec460;background:#0f1e0a}
.card{background:#1e1508;border:1px solid #3d2e10;border-radius:12px;padding:1.25rem 1.5rem;width:100%;max-width:520px;margin-bottom:1rem}
.ct{font-size:.7rem;font-weight:700;letter-spacing:.1em;color:#d4a017;text-transform:uppercase;margin-bottom:.75rem}
.jw{display:flex;align-items:center;background:#2a1e08;border:1px solid #3d2e10;border-radius:8px;overflow:hidden;transition:border-color .15s}
.jw:focus-within{border-color:#d4a017}
.jp{padding:.6rem .7rem .6rem .85rem;font-size:.95rem;font-weight:700;color:#a08858;border-right:1px solid #3d2e10;white-space:nowrap}
.jw input{border:none;background:transparent;flex:1;padding:.6rem .7rem;font-weight:700;letter-spacing:.05em;color:#f5e6c0;font-size:.95rem;outline:none}
.js{padding:.6rem .85rem .6rem .4rem;font-size:.95rem;font-weight:700;color:#a08858;white-space:nowrap}
/* upload */
.upwrap{position:relative;border:2px dashed #3d2e10;border-radius:8px;overflow:hidden;transition:border-color .2s}
.upwrap:hover{border-color:#d4a017}
.upwrap.ok{border-color:#3d8a30;border-style:solid}
.upwrap input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2}
.upface{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.2rem;gap:.3rem;pointer-events:none}
.upface span{font-size:.9rem;color:#a08858}
.upface small{font-size:.72rem;color:#6a5030}
.prev{margin-top:10px;display:none;text-align:center}
.prev img{max-height:150px;max-width:100%;border-radius:8px;object-fit:contain;border:1px solid #3d2e10}
.prev p{font-size:.78rem;color:#6ec460;margin-top:5px}
.genbtn{width:100%;max-width:520px;padding:.9rem;font-size:1.1rem;font-weight:800;border-radius:12px;border:none;background:linear-gradient(135deg,#e8a000,#ffd700,#e8a000);color:#1a0800;cursor:pointer;letter-spacing:.03em;transition:opacity .15s,transform .1s;margin-top:.5rem}
.genbtn:hover{opacity:.88}
.genbtn:active{transform:scale(.98)}
.genbtn:disabled{background:#2a1e08!important;color:#5a4828!important;cursor:not-allowed!important;border:1px solid #3d2e10}
.pw{width:100%;max-width:520px;margin-top:1rem;display:none}
.pt{height:4px;background:#3d2e10;border-radius:2px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#e8a000,#ffd700);width:0%;transition:width .4s;border-radius:2px}
.sm{font-size:.8rem;color:#a08858;margin-top:.5rem;text-align:center;min-height:1.2em}
.sm.e{color:#e04040}
.res{width:100%;max-width:520px;margin-top:1.5rem;display:none;text-align:center}
.res canvas{width:100%;max-width:480px;border-radius:12px;display:block;margin:0 auto;box-shadow:0 8px 40px rgba(212,160,23,.18)}
.rbtns{display:flex;gap:10px;justify-content:center;margin-top:1rem}
.rbtns button{padding:.65rem 1.4rem;border-radius:8px;font-size:.88rem;cursor:pointer;transition:border-color .15s,color .15s;background:#1e1508;border:1px solid #3d2e10;color:#f5e6c0}
.rbtns button:hover{border-color:#d4a017;color:#d4a017}
</style>
</head>
<body>
<div class="ttl">
  <h1>⚡ キミは○○JIN</h1>
  <p>好きなキャラの画像と文字を入れてオマージュ画像を生成</p>
</div>

<div class="steps">
  <div class="step on" id="sA">① 文字を入力</div>
  <div class="step" id="sB">② 画像を選択</div>
  <div class="step" id="sC">③ 生成！</div>
</div>

<div class="card">
  <div class="ct">✏️ ○○ に入る文字</div>
  <div class="jw">
    <span class="jp">キミは</span>
    <input type="text" id="jinText" placeholder="SAIIYA" maxlength="20" autocomplete="off"
      oninput="this.value=this.value.toUpperCase();chk()">
    <span class="js">JIN</span>
  </div>
</div>

<div class="card">
  <div class="ct">🖼️ キャラクター画像</div>
  <div class="upwrap" id="upwrap">
    <input type="file" id="fileIn" accept="image/*" onchange="onFile(event)">
    <div class="upface">
      <span id="upTxt">📷 タップして画像を選択</span>
      <small>PNG / JPG / WEBP ／ 背景ありでもOK</small>
    </div>
  </div>
  <div class="prev" id="prev">
    <img id="prevImg" src="" alt="">
    <p id="prevName"></p>
  </div>
</div>

<button class="genbtn" id="genBtn" disabled onclick="generate()">✨ 画像を生成する</button>

<div class="pw" id="pw">
  <div class="pt"><div class="pf" id="pf"></div></div>
  <div class="sm" id="sm"></div>
</div>

<div class="res" id="res">
  <canvas id="cv" width="1024" height="1024"></canvas>
  <div class="rbtns">
    <button onclick="dlImg()">⬇ ダウンロード</button>
    <button onclick="generate()">🔄 再生成</button>
  </div>
</div>

const BG_CACHE_KEY = 'jin_bg_v1';
var _cachedBgImg = null;

async function getBackground() {
  // Return cached image if available
  if (_cachedBgImg) return _cachedBgImg;
  
  // Try localStorage cache
  const stored = localStorage.getItem(BG_CACHE_KEY);
  if (stored) {
    return new Promise(function(res) {
      const img = new Image();
      img.onload = function() { _cachedBgImg = img; res(img); };
      img.src = stored;
    });
  }
  
  // Generate via Gemini
  return await generateBackground();
}

async function generateBackground() {
  const prompt =
    'This image shows a rainbow spiral vortex background with a character and text on top.\n' +
    'Please regenerate ONLY the background spiral pattern — completely remove the character, person, and all text.\n' +
    'Keep exactly the same vivid rainbow spiral vortex: bright saturated colors (yellow, orange, red, magenta, purple, blue, cyan, green), thick smooth spiral bands, radiating from center.\n' +
    'Output: pure rainbow spiral background only, no people, no text, square image.';

  const refB64 = REF_IMG.split(',')[1];
  const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=' + APIKEY;
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      contents: [{parts: [
        {text: prompt},
        {inline_data: {mime_type: 'image/jpeg', data: refB64}}
      ]}],
      generationConfig: {response_modalities: ['IMAGE', 'TEXT']}
    })
  });
  if (!res.ok) throw new Error('BG generation failed: HTTP ' + res.status);
  const data = await res.json();
  const parts = (data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts)||[];
  for (var i=0;i<parts.length;i++) {
    if (parts[i].inline_data&&parts[i].inline_data.mime_type&&parts[i].inline_data.mime_type.startsWith('image/')) {
      const dataUrl = 'data:' + parts[i].inline_data.mime_type + ';base64,' + parts[i].inline_data.data;
      // Cache to localStorage
      try { localStorage.setItem(BG_CACHE_KEY, dataUrl); } catch(e) {}
      return new Promise(function(res2) {
        const img = new Image();
        img.onload = function() { _cachedBgImg = img; res2(img); };
        img.src = dataUrl;
      });
    }
  }
  throw new Error('No image in BG response');
}

function onFile(e){

  r.readAsDataURL(f);
}

function getRingColor(angleDeg) {
  // Normalize angle to 0-360
  angleDeg = ((angleDeg % 360) + 360) % 360;
  var step = 5;
  var idx = Math.floor(angleDeg / step);
  var frac = (angleDeg % step) / step;
  var c0 = RING[idx % RING.length];
  var c1 = RING[(idx+1) % RING.length];
  return [
    Math.round(c0[1]*(1-frac) + c1[1]*frac),
    Math.round(c0[2]*(1-frac) + c1[2]*frac),
    Math.round(c0[3]*(1-frac) + c1[3]*frac)
  ];
}

function drawBg(ctx, S) {
  var cx = S/2, cy = S/2;
  var maxR = S * 0.71;
  var turns = 3.5; // spiral turns
  var steps = 2000;

  // Dark base
  ctx.fillStyle = '#0a0010';
  ctx.fillRect(0,0,S,S);

  // Draw spiral: each step is a short arc
  // Color = ring color at current angle, brightness scales with radius
  for (var i = 0; i < steps; i++) {
    var t = i / steps;
    var angle = t * Math.PI * 2 * turns;
    var r = t * maxR;
    var angleDeg = (angle * 180 / Math.PI) % 360;

    var col = getRingColor(angleDeg);
    // Brightness: dark at center, full at edge
    var bright = 0.25 + 0.75 * t;
    var rc = Math.min(255, Math.round(col[0] * bright));
    var gc = Math.min(255, Math.round(col[1] * bright));
    var bc = Math.min(255, Math.round(col[2] * bright));

    var arcSpan = (Math.PI * 2 * turns / steps) * 2.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r, angle, angle + arcSpan);
    ctx.lineWidth = maxR / 42; // thick lines = smooth fill
    ctx.strokeStyle = 'rgb('+rc+','+gc+','+bc+')';
    ctx.globalAlpha = 1.0;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Center bright glow
  var g = ctx.createRadialGradient(cx,cy,0,cx,cy,S*0.22);
  g.addColorStop(0,'rgba(255,240,200,0.35)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,S,S);

  // Sparkles
  drawSpark(ctx, S*0.84, S*0.80, S*0.020, 'rgba(255,255,255,0.95)');
  drawSpark(ctx, S*0.76, S*0.88, S*0.012, 'rgba(255,255,255,0.65)');
  drawSpark(ctx, S*0.91, S*0.70, S*0.009, 'rgba(255,255,255,0.5)');
}

function drawSpark(ctx,x,y,sz,col){
  ctx.save(); ctx.translate(x,y);
  for(var i=0;i<4;i++){
    var a=i*Math.PI/2;
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);
    ctx.lineWidth=Math.max(1,sz*0.12);
    ctx.strokeStyle=col; ctx.stroke();
  }
  ctx.restore();
}

function drawGold(ctx,text,S){
  var y=S*0.60;
  var fs=Math.floor(S*0.148);
  function font(sz){return '900 '+sz+'px "Arial Black",Impact,Arial,sans-serif';}
  ctx.font=font(fs);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  while(ctx.measureText(text).width>S*0.97&&fs>22){fs-=2;ctx.font=font(fs);}

  var x=S/2;
  // Outermost shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.95)';
  ctx.shadowBlur=fs*0.18;
  ctx.shadowOffsetX=fs*0.06;
  ctx.shadowOffsetY=fs*0.10;
  ctx.lineWidth=fs*0.26; ctx.lineJoin='round';
  ctx.strokeStyle='#150800'; ctx.strokeText(text,x,y);
  ctx.restore();
  // Dark brown outer stroke
  ctx.lineWidth=fs*0.22; ctx.lineJoin='round';
  ctx.strokeStyle='#3a1500'; ctx.strokeText(text,x,y);
  // Mid brown bevel
  ctx.lineWidth=fs*0.13;
  ctx.strokeStyle='#7a3500'; ctx.strokeText(text,x,y);
  // Gold gradient fill
  var g=ctx.createLinearGradient(0,y-fs*0.58,0,y+fs*0.58);
  g.addColorStop(0.00,'#fff9b0');
  g.addColorStop(0.08,'#ffe030');
  g.addColorStop(0.28,'#f09808');
  g.addColorStop(0.52,'#ffc200');
  g.addColorStop(0.76,'#c07000');
  g.addColorStop(1.00,'#6a3600');
  ctx.fillStyle=g; ctx.fillText(text,x,y);
  // Top gloss
  var h=ctx.createLinearGradient(0,y-fs*0.58,0,y-fs*0.06);
  h.addColorStop(0,'rgba(255,255,210,0.68)');
  h.addColorStop(1,'rgba(255,255,210,0)');
  ctx.fillStyle=h; ctx.fillText(text,x,y);
}

function drawSub(ctx,text,S){
  var fs=S*0.036;
  ctx.save();
  ctx.font='500 '+fs+'px "Helvetica Neue",Arial,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.85)';
  ctx.shadowBlur=5; ctx.shadowOffsetX=1; ctx.shadowOffsetY=1;
  ctx.fillStyle='#fff';
  ctx.fillText(text,S/2,S*0.875);
  ctx.restore();
}

function loadImg(b64,mime){
  return new Promise(function(res,rej){
    var img=new Image();
    img.onload=function(){res(img);};
    img.onerror=rej;
    img.src='data:'+mime+';base64,'+b64;
  });
}

// ── Gemini API ────────────────────────────────────────────
async function callGemini(b64,mime){
  // Step 1: analyze the character features
  // Step 2: generate a new T-pose image based on those features
  var prompt=
    'Look at this image carefully and identify the main character.\n'+
    'Analyze and memorize ALL of the following details:\n'+
    '- Art style (anime, realistic, game art, chibi, etc.)\n'+
    '- Hair: color, length, style\n'+
    '- Face: features, expression\n'+
    '- Outfit: every clothing item, colors, accessories, armor, props\n'+
    '- Body type and proportions\n'+
    '\n'+
    'Now GENERATE A NEW ILLUSTRATION of that same character with these requirements:\n'+
    '1. FULL BODY visible from head to feet\n'+
    '2. T-POSE: standing straight upright, BOTH ARMS stretched out horizontally to the sides (like the letter T), palms facing down\n'+
    '3. Facing directly toward the viewer (front view)\n'+
    '4. WHITE background only — no scenery, no props, no shadows\n'+
    '5. Centered horizontally, character fills most of the vertical space\n'+
    '6. Keep EXACTLY the same art style, hair, face, and outfit as the original\n'+
    '\n'+
    'Output: a single full-body illustration of the character in T-pose on a plain white background.';
  var url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key='+APIKEY;
  var res=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt},{inline_data:{mime_type:mime,data:b64}}]}],
      generationConfig:{response_modalities:['IMAGE','TEXT']}
    })
  });
  if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error((e.error&&e.error.message)||'HTTP '+res.status);}
  return res.json();
}

// ── Generate ──────────────────────────────────────────────
async function generate(){
  var jin=document.getElementById('jinText').value.trim().toUpperCase();
  if(!jin||!cb64)return;

  document.getElementById('genBtn').disabled=true;
  document.getElementById('res').style.display='none';
  prog(8,'🎨 Gemini にキャラ抽出＋Tポーズ化を依頼中...');

  var outB64=cb64, outMime=cmime;
  try{
    // Step 1: Analyze
    prog(15,'🔍 キャラクターの特徴を分析中...');
    var description = await analyzeChar(cb64, cmime);
    prog(40,'🎨 T字ポーズで再生成中... (20〜40秒かかります)');
    // Step 2: Generate T-pose
    var resp = await generateTPose(description);
    var parts=(resp.candidates&&resp.candidates[0]&&resp.candidates[0].content&&resp.candidates[0].content.parts)||[];
    var ip=null;
    for(var i=0;i<parts.length;i++){if(parts[i].inline_data&&parts[i].inline_data.mime_type&&parts[i].inline_data.mime_type.startsWith('image/')){ip=parts[i];break;}}
    if(ip){outB64=ip.inline_data.data;outMime=ip.inline_data.mime_type;prog(70,'✅ 生成完了！合成中...');}
    else{prog(70,'⚠️ 生成できませんでした。元画像で合成します...');}
  }catch(err){prog(70,'⚠️ '+err.message.slice(0,50)+'... 元画像で合成',false);}

  prog(75,'🖼️ 合成中...');
  var S=1024;
  var canvas=document.getElementById('cv');
  canvas.width=S; canvas.height=S;
  var ctx=canvas.getContext('2d');

  // 1. Background — use Gemini-generated or cached
  prog(76,'🌈 背景を読み込み中...');
  var bgImg = null;
  try {
    bgImg = await getBackground();
  } catch(e) {
    console.warn('BG load failed:', e.message);
  }
  if (bgImg) {
    ctx.drawImage(bgImg, 0, 0, S, S);
  } else {
    drawBg(ctx, S); // fallback to canvas drawing
  }

  // 2. Character (behind text)
  try{
    var img=await loadImg(outB64,outMime);
    var ch=S*0.78;
    var cw=img.width*(ch/img.height);
    var cx2=(S-cw)/2;
    var cy2=S*0.035;
    ctx.drawImage(img,cx2,cy2,cw,ch);
  }catch(e){}

  // 3. Gold text on top
  drawGold(ctx,'キミは'+jin+'JIN',S);

  // 4. Subtitle
  drawSub(ctx,'キミは'+jin+'JIN？',S);

  prog(100,'🎉 完成！');
  document.getElementById('res').style.display='block';
  document.getElementById('genBtn').disabled=false;
}

function dlImg(){
  var jin=document.getElementById('jinText').value.trim().toUpperCase()||'JIN';
  var a=document.createElement('a');
  a.download='kimi_wa_'+jin+'JIN.png';
  a.href=document.getElementById('cv').toDataURL('image/png');
  a.click();
}
