let charB64 = null, charMime = null;

// ─── Init ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => { updateSteps(); });


// ─── API key ─────────────────────────────────────────────


// ─── Steps ───────────────────────────────────────────────
function updateSteps() {
  const hasKey  = true;
  const hasText = document.getElementById('jinText').value.trim().length > 0;
  const hasImg  = charB64 !== null;
  ss('s2', hasText ? 'done' : 'active');
  ss('s3', hasImg  ? 'done' : (hasText ? 'active' : ''));
  ss('s4', (hasText && hasImg) ? 'active' : '');
  document.getElementById('btnGenerate').disabled = !(hasText && hasImg);
}
function ss(id, state) {
  document.getElementById(id).className = 'step' + (state ? ' ' + state : '');
}

// ─── File upload ─────────────────────────────────────────
function handleFile(e) {
  const file = e.target.files[0]; if (!file) return;
  processFile(file);
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    charMime = file.type || 'image/png';
    charB64  = dataUrl.split(',')[1];
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewName').textContent = '✓ ' + file.name;
    document.getElementById('previewArea').style.display = 'block';
    updateSteps();
  };
  reader.onerror = () => { alert('読み込み失敗。別の画像を試してください。'); };
  reader.readAsDataURL(file);
}

// ─── Gemini image generation ─────────────────────────────
async function callGeminiImgGen(apiKey, prompt, b64, mime) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [
          { text: prompt },
          { inline_data: { mime_type: mime, data: b64 } }
        ]
      }],
      generationConfig: { response_modalities: ['IMAGE', 'TEXT'] }
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  return res.json();
}

// ─── Canvas helpers ──────────────────────────────────────
// ===== REPLACEMENT FUNCTIONS =====

function drawBg(ctx, S) {
  const cx = S * 0.5, cy = S * 0.5;

  // Black letterbox bars (top/bottom ~19%)
  const barH = S * 0.192;
  const innerY = barH;
  const innerH = S - barH * 2;

  // Fill entire canvas black first
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, S, S);

  // === Draw swirl into the inner area ===
  // Background base — warm dark
  ctx.fillStyle = '#1a0a02';
  ctx.fillRect(0, innerY, S, innerH);

  // The swirl: concentric arcs rotating with rainbow hues
  // Colors sampled from reference image, going around the spiral
  // Reference shows: red-orange top-right, yellow-green bottom-right,
  // blue bottom-left/left, purple top-left, cycling multiple times
  const swirlColors = [
    '#c43010', // red-orange (0°)
    '#c87a18', // amber (30°)
    '#8ab030', // yellow-green (60°)
    '#204820', // dark green (90°)
    '#204878', // blue-green (120°)
    '#304868', // blue (150°)
    '#b03010', // red (180°)
    '#602858', // purple (210°)
    '#502050', // deep purple (240°)
    '#604038', // warm brown (270°)
    '#c04830', // orange-red (300°)
    '#a05828', // amber-brown (330°)
  ];

  // Draw multiple passes of spiral rings
  const innerCX = S * 0.5;
  const innerCY = innerY + innerH * 0.5;
  const maxR = S * 0.52;

  // Draw thick swirl bands - many overlapping arcs
  const totalSteps = 1200;
  for (let i = 0; i < totalSteps; i++) {
    const t = i / totalSteps;
    // Spiral: angle increases, radius increases
    const spiralTurns = 4.5;
    const angle = t * Math.PI * 2 * spiralTurns;
    const r = t * maxR;

    // Color cycles around the wheel multiple times
    const colorT = (t * spiralTurns * swirlColors.length) % swirlColors.length;
    const ci = Math.floor(colorT) % swirlColors.length;
    const cf = colorT - Math.floor(colorT);
    const c1 = hexToRgb(swirlColors[ci]);
    const c2 = hexToRgb(swirlColors[(ci+1) % swirlColors.length]);
    const rc = Math.round(c1[0]*(1-cf)+c2[0]*cf);
    const gc = Math.round(c1[1]*(1-cf)+c2[1]*cf);
    const bc = Math.round(c1[2]*(1-cf)+c2[2]*cf);

    ctx.beginPath();
    const arcSpan = (Math.PI * 2 * spiralTurns / totalSteps) * 2.5;
    ctx.arc(innerCX, innerCY, r, angle, angle + arcSpan);
    ctx.lineWidth = maxR / 55;
    ctx.strokeStyle = `rgb(${rc},${gc},${bc})`;
    ctx.globalAlpha = 0.9;
    ctx.stroke();
  }
  ctx.globalAlpha = 1.0;

  // Brighten center slightly
  const centerGlow = ctx.createRadialGradient(innerCX, innerCY, 0, innerCX, innerCY, maxR * 0.4);
  centerGlow.addColorStop(0, 'rgba(255,210,120,0.18)');
  centerGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = centerGlow;
  ctx.fillRect(0, innerY, S, innerH);

  // Clip bars back to solid black (clean edges)
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, S, barH);
  ctx.fillRect(0, S - barH, S, barH);

  // Sparkle (bottom-right, inside the image area)
  drawSparkle(ctx, S * 0.885, innerY + innerH * 0.76, S * 0.022, '#ffffff');
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function drawSparkle(ctx, x, y, size, color) {
  ctx.save();
  ctx.translate(x, y);
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2;
    const len = i % 2 === 0 ? size : size * 0.6;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * len, Math.sin(a) * len);
    ctx.lineWidth = Math.max(1, size * 0.08);
    ctx.strokeStyle = color;
    ctx.stroke();
  }
  ctx.restore();
}

function drawGoldText(ctx, text, x, y, S) {
  // Font: as large as possible, filling near full width
  let fs = Math.floor(S * 0.145);
  const fontStr = (sz) => `900 ${sz}px 'Arial Black', 'Impact', Arial, sans-serif`;
  ctx.font = fontStr(fs);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  while (ctx.measureText(text).width > S * 0.97 && fs > 24) {
    fs -= 2;
    ctx.font = fontStr(fs);
  }

  // === Layer 1: Outermost dark shadow (offset) ===
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.95)';
  ctx.shadowBlur = fs * 0.15;
  ctx.shadowOffsetX = fs * 0.055;
  ctx.shadowOffsetY = fs * 0.09;
  ctx.lineWidth = fs * 0.22;
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#1a0800';
  ctx.strokeText(text, x, y);
  ctx.restore();

  // === Layer 2: Thick dark brown stroke (3D base) ===
  ctx.lineWidth = fs * 0.20;
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#3d1a00';
  ctx.strokeText(text, x, y);

  // === Layer 3: Medium brown stroke (bevel) ===
  ctx.lineWidth = fs * 0.12;
  ctx.strokeStyle = '#7a3800';
  ctx.strokeText(text, x, y);

  // === Layer 4: Gold gradient fill ===
  const g = ctx.createLinearGradient(0, y - fs * 0.58, 0, y + fs * 0.58);
  g.addColorStop(0.00, '#fff8b0');  // bright yellow-white top
  g.addColorStop(0.10, '#ffd700');  // pure gold
  g.addColorStop(0.30, '#f0a010');  // orange-gold
  g.addColorStop(0.55, '#ffc500');  // mid gold
  g.addColorStop(0.78, '#c07800');  // darker gold
  g.addColorStop(1.00, '#6a3a00');  // dark brown base
  ctx.fillStyle = g;
  ctx.fillText(text, x, y);

  // === Layer 5: Top highlight gloss ===
  const hi = ctx.createLinearGradient(0, y - fs * 0.58, 0, y - fs * 0.05);
  hi.addColorStop(0, 'rgba(255,255,200,0.65)');
  hi.addColorStop(1, 'rgba(255,255,200,0.0)');
  ctx.fillStyle = hi;
  ctx.fillText(text, x, y);

  return fs;
}

function drawSubtitle(ctx, text, x, y, S) {
  const fs = S * 0.037;
  ctx.save();
  ctx.font = `500 ${fs}px 'Helvetica Neue', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Subtle shadow
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, x, y);
  ctx.restore();
}



function loadImg(b64, mime) {
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = ()=>res(img);
    img.onerror = rej;
    img.src = `data:${mime};base64,${b64}`;
  });
}

// ─── Main generate ────────────────────────────────────────
async function generate() {
  const apiKey  = 'AIzaAb8RN6JXBpZavs8JCZU8liuadiqzEKReBPKKvQSqylrSLUYsoQ';
  const jinText = document.getElementById('jinText').value.trim().toUpperCase();
  if (!jinText || !charB64) return;

  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'block';
  setStep4('active');

  try {
    setProgress(8, '🎨 Gemini にキャラクター抽出＋Tポーズ化を依頼中...');

    // ── Gemini prompt ──────────────────────────────────────
    const prompt = `You are given an image that may contain a character (anime, illustration, photo, game art, etc.) possibly with a background.

Your task:
1. Identify the MAIN CHARACTER in the image.
2. Extract ONLY that character, completely removing any background.
3. Redraw or composite the character in a FULL-BODY T-POSE: standing straight upright, both arms stretched out horizontally to the sides (like the letter T), facing the viewer directly from the front.
4. Preserve the character's original appearance: clothing, hair color/style, skin tone, accessories, art style.
5. The output image must have a PURE WHITE or TRANSPARENT background with ONLY the character.
6. The character should be TALL and CENTERED, filling most of the vertical space (head near top, feet near bottom).
7. Keep the same art style as the original (anime, realistic, etc.).

Output: a single character image on a clean background, T-pose, full body visible from head to feet.`;

    let outB64 = charB64, outMime = charMime;

    try {
      setProgress(20, '🤖 Gemini が処理中... (10〜30秒かかります)');
      const resp = await callGeminiImgGen(apiKey, prompt, charB64, charMime);
      const parts = resp.candidates?.[0]?.content?.parts || [];
      const imgPart = parts.find(p => p.inline_data?.mime_type?.startsWith('image/'));
      if (imgPart) {
        outB64  = imgPart.inline_data.data;
        outMime = imgPart.inline_data.mime_type;
        setProgress(65, '✅ キャラクター変換完了！合成中...');
      } else {
        setProgress(65, '⚠️ 変換できませんでした。元画像で合成します...');
      }
    } catch(e) {
      console.warn('Gemini error:', e.message);
      setProgress(65, `⚠️ Gemini エラー (${e.message.slice(0,60)})。元画像で合成...`);
    }

    // ── Canvas composite ───────────────────────────────────
    setProgress(75, '🖼️ 画像を合成中...');
    const S = 1024;
    const canvas = document.getElementById('outputCanvas');
    canvas.width = S; canvas.height = S;
    const ctx = canvas.getContext('2d');

    drawBg(ctx, S);

    // Draw character BEHIND text
    try {
      const charImg = await loadImg(outB64, outMime);
      const charH = S * 0.80;
      const charW = charImg.width * (charH / charImg.height);
      const charX = (S - charW) / 2;
      // Place character so feet land around 88% down
      const charY = S * 0.192 + (S * 0.616) - charH * 0.88;
      ctx.drawImage(charImg, charX, charY, charW, charH);
    } catch(e) { console.warn('char draw:', e); }

    // Gold text — drawn ON TOP of character (like reference)
    const mainText = `キミは${jinText}JIN`;
    drawGoldText(ctx, mainText, S/2, S*0.598, S);

    // Subtitle
    drawSubtitle(ctx, `キミは${jinText}JIN？`, S/2, S*0.768, S);

    setProgress(100, '🎉 完成！');
    document.getElementById('resultWrap').style.display = 'block';
    setStep4('done');

  } catch(e) {
    setProgress(0, `❌ エラー: ${e.message}`, true);
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

function downloadImage() {
  const jinText = document.getElementById('jinText').value.trim().toUpperCase() || 'JIN';
  const a = document.createElement('a');
  a.download = `kimi_wa_${jinText}JIN.png`;
  a.href = document.getElementById('outputCanvas').toDataURL('image/png');
  a.click();
}

function setProgress(pct, msg, isErr=false) {
  document.getElementById('progressFill').style.width = pct + '%';
  const s = document.getElementById('statusMsg');
  if (msg) { s.textContent = msg; s.className = 'status-msg' + (isErr?' error':''); }
}
function setStep4(state) { ss('s4', state); }

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'2rem', left:'50%', transform:'translateX(-50%)',
    background:'#2a1e08', border:'1px solid #3d8a30', color:'#6ec460',
    padding:'0.55rem 1.2rem', borderRadius:'8px', fontSize:'0.82rem',
    zIndex:9999, pointerEvents:'none', transition:'opacity 0.3s'
  });
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2000);
}
</script>
