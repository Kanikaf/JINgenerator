<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>キミは○○JIN ジェネレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#0f0a00;color:#f5e6c0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem}
.header{text-align:center;margin-bottom:2rem}
.header h1{font-size:1.9rem;font-weight:900;background:linear-gradient(135deg,#fffacc 0%,#ffd700 40%,#e8a000 70%,#ffd700 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem}
.header p{font-size:.85rem;color:#a08858}
.steps{display:flex;gap:6px;width:100%;max-width:520px;margin-bottom:1.25rem}
.step{flex:1;text-align:center;font-size:.68rem;padding:5px 2px;border-radius:6px;border:1px solid #3d2e10;color:#a08858;background:#1e1508;transition:all .2s}
.step.active{border-color:#d4a017;color:#d4a017;background:#1e1500}
.step.done{border-color:#3d8a30;color:#6ec460;background:#0f1e0a}
.card{background:#1e1508;border:1px solid #3d2e10;border-radius:12px;padding:1.25rem 1.5rem;width:100%;max-width:520px;margin-bottom:1rem}
.card-title{font-size:.7rem;font-weight:700;letter-spacing:.1em;color:#d4a017;text-transform:uppercase;margin-bottom:.75rem}
.jin-wrap{display:flex;align-items:center;background:#2a1e08;border:1px solid #3d2e10;border-radius:8px;overflow:hidden;transition:border-color .15s}
.jin-wrap:focus-within{border-color:#d4a017}
.jin-pre{padding:.6rem .7rem .6rem .85rem;font-size:.95rem;font-weight:700;color:#a08858;border-right:1px solid #3d2e10;white-space:nowrap}
.jin-wrap input{border:none;border-radius:0;background:transparent;flex:1;padding:.6rem .7rem;font-weight:700;letter-spacing:.05em;color:#f5e6c0;font-size:.95rem;outline:none}
.jin-suf{padding:.6rem .85rem .6rem .4rem;font-size:.95rem;font-weight:700;color:#a08858;white-space:nowrap}
/* File input styled as button */
.file-btn-wrap{position:relative}
.file-btn-wrap input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:0}
.file-btn{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1rem;background:#2a1e08;border:2px dashed #3d2e10;border-radius:8px;color:#a08858;font-size:.9rem;cursor:pointer;transition:border-color .2s,color .2s;pointer-events:none}
.file-btn-wrap:hover .file-btn,.file-btn-wrap.has-file .file-btn{border-color:#d4a017;color:#d4a017;border-style:solid}
.preview{margin-top:12px;display:none;text-align:center}
.preview img{max-height:160px;max-width:100%;border-radius:8px;object-fit:contain;border:1px solid #3d2e10}
.preview p{font-size:.78rem;color:#6ec460;margin-top:6px}
.btn-gen{width:100%;max-width:520px;padding:.9rem;font-size:1.05rem;font-weight:800;border-radius:12px;border:none;background:linear-gradient(135deg,#e8a000,#ffd700,#e8a000);color:#1a0800;cursor:pointer;letter-spacing:.03em;transition:opacity .15s,transform .1s;margin-top:.5rem}
.btn-gen:hover{opacity:.9}
.btn-gen:active{transform:scale(.98)}
.btn-gen:disabled{background:#3d2e10!important;color:#a08858!important;cursor:not-allowed!important;opacity:.7!important}
.prog-wrap{width:100%;max-width:520px;margin-top:1rem;display:none}
.prog-track{height:4px;background:#3d2e10;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#e8a000,#ffd700);width:0%;transition:width .4s ease;border-radius:2px}
.status{font-size:.8rem;color:#a08858;margin-top:.5rem;text-align:center;min-height:1.2em}
.status.err{color:#e04040}
.result{width:100%;max-width:520px;margin-top:1.5rem;display:none;text-align:center}
.result canvas{width:100%;max-width:480px;border-radius:12px;display:block;margin:0 auto;box-shadow:0 8px 40px rgba(212,160,23,.2)}
.result-btns{display:flex;gap:10px;justify-content:center;margin-top:1rem}
.btn-dl,.btn-re{padding:.65rem 1.4rem;border-radius:8px;font-size:.88rem;cursor:pointer;transition:border-color .15s,color .15s}
.btn-dl{background:#1e1508;border:1px solid #3d2e10;color:#f5e6c0}
.btn-dl:hover{border-color:#d4a017;color:#d4a017}
.btn-re{background:transparent;border:1px solid #3d2e10;color:#a08858}
.btn-re:hover{border-color:#d4a017;color:#d4a017}
</style>
</head>
<body>
<div class="header">
  <h1>⚡ キミは○○JIN</h1>
  <p>好きなキャラの画像と文字を入れてオマージュ画像を生成</p>
</div>

<div class="steps">
  <div class="step active" id="s2">① 文字を入力</div>
  <div class="step" id="s3">② 画像を選択</div>
  <div class="step" id="s4">③ 生成！</div>
</div>

<div class="card">
  <div class="card-title">✏️ ○○ に入る文字</div>
  <div class="jin-wrap">
    <span class="jin-pre">キミは</span>
    <input type="text" id="jinText" placeholder="SAIIYA" maxlength="20" autocomplete="off" oninput="this.value=this.value.toUpperCase();checkReady()">
    <span class="jin-suf">JIN</span>
  </div>
</div>

<div class="card">
  <div class="card-title">🖼️ キャラクター画像</div>
  <div class="file-btn-wrap" id="fileBtnWrap">
    <input type="file" id="fileInput" accept="image/*" onchange="onFileChange(event)">
    <div class="file-btn" id="fileBtn">
      <span>📷</span>
      <span id="fileBtnText">タップして画像を選択（背景ありでもOK）</span>
    </div>
  </div>
  <div class="preview" id="preview">
    <img id="previewImg" src="" alt="preview">
    <p id="previewName"></p>
  </div>
</div>

<button class="btn-gen" id="btnGen" disabled onclick="generate()">✨ 画像を生成する</button>

<div class="prog-wrap" id="progWrap">
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  <div class="status" id="statusMsg"></div>
</div>

<div class="result" id="resultWrap">
  <canvas id="canvas" width="1024" height="1024"></canvas>
  <div class="result-btns">
    <button class="btn-dl" onclick="dlImage()">⬇ ダウンロード</button>
    <button class="btn-re" onclick="generate()">🔄 再生成</button>
  </div>
</div>

<script>
const API_KEY = 'AIzaAb8RN6JXBpZavs8JCZU8liuadiqzEKReBPKKvQSqylrSLUYsoQ';
let charB64 = null, charMime = 'image/png';

// ── File select ──────────────────────────────────────────
function onFileChange(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const dataUrl = ev.target.result;
    charMime = file.type || 'image/png';
    charB64  = dataUrl.split(',')[1];
    // Show preview
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewName').textContent = '✓ ' + file.name;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('fileBtnText').textContent = '画像を変更する';
    document.getElementById('fileBtnWrap').classList.add('has-file');
    checkReady();
  };
  reader.readAsDataURL(file);
}

function checkReady() {
  const hasText = document.getElementById('jinText').value.trim().length > 0;
  const hasImg  = charB64 !== null;
  const btn = document.getElementById('btnGen');
  btn.disabled = !(hasText && hasImg);
  // Update steps
  const s2 = document.getElementById('s2');
  const s3 = document.getElementById('s3');
  const s4 = document.getElementById('s4');
  if (s2) s2.className = 'step ' + (hasText ? 'done' : 'active');
  if (s3) s3.className = 'step ' + (hasImg ? 'done' : (hasText ? 'active' : ''));
  if (s4) s4.className = 'step ' + ((hasText && hasImg) ? 'active' : '');
}

// ── Progress / status ─────────────────────────────────────
function setProgress(pct, msg, isErr) {
  document.getElementById('progWrap').style.display = 'block';
  document.getElementById('progFill').style.width = pct + '%';
  const s = document.getElementById('statusMsg');
  s.textContent = msg || '';
  s.className = 'status' + (isErr ? ' err' : '');
}

// ── Gemini image generation ───────────────────────────────
async function callGemini(prompt, b64, mime) {
  const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=' + API_KEY;
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      contents: [{parts: [
        {text: prompt},
        {inline_data: {mime_type: mime, data: b64}}
      ]}],
      generationConfig: {response_modalities: ['IMAGE','TEXT']}
    })
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error && e.error.message ? e.error.message : 'HTTP ' + res.status);
  }
  return res.json();
}

// ── Canvas drawing ────────────────────────────────────────
function drawBg(ctx, S) {
  const cx = S * 0.5, cy = S * 0.5;
  const barH = Math.round(S * 0.192);
  const innerY = barH;
  const innerH = S - barH * 2;
  const innerCY = innerY + innerH * 0.5;

  // Black base
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, S, S);

  // Warm dark base for swirl area
  ctx.fillStyle = '#160a00';
  ctx.fillRect(0, innerY, S, innerH);

  // Swirl colors matching reference image
  const colors = [
    '#c43010','#c87a18','#8ab030','#204820',
    '#204878','#304868','#b03010','#602858',
    '#502050','#604038','#c04830','#a05828'
  ];

  function hexRgb(h) {
    return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  }

  const maxR = S * 0.52;
  const steps = 1200;
  for (let i = 0; i < steps; i++) {
    const t = i / steps;
    const angle = t * Math.PI * 2 * 4.5;
    const r = t * maxR;
    const ct = (t * 4.5 * colors.length) % colors.length;
    const ci = Math.floor(ct) % colors.length;
    const cf = ct - Math.floor(ct);
    const c1 = hexRgb(colors[ci]);
    const c2 = hexRgb(colors[(ci+1) % colors.length]);
    const rc = Math.round(c1[0]*(1-cf)+c2[0]*cf);
    const gc = Math.round(c1[1]*(1-cf)+c2[1]*cf);
    const bc = Math.round(c1[2]*(1-cf)+c2[2]*cf);
    ctx.beginPath();
    ctx.arc(cx, innerCY, r, angle, angle + 0.22);
    ctx.lineWidth = maxR / 52;
    ctx.strokeStyle = 'rgb('+rc+','+gc+','+bc+')';
    ctx.globalAlpha = 0.9;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Center glow
  const g = ctx.createRadialGradient(cx, innerCY, 0, cx, innerCY, maxR * 0.4);
  g.addColorStop(0, 'rgba(255,210,120,0.18)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, innerY, S, innerH);

  // Black bars
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, S, barH);
  ctx.fillRect(0, S - barH, S, barH);

  // Sparkle
  drawSparkle(ctx, S*0.885, innerY + innerH*0.76, S*0.022);
}

function drawSparkle(ctx, x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a)*size, Math.sin(a)*size);
    ctx.lineWidth = Math.max(1.5, size*0.07);
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.stroke();
  }
  ctx.restore();
}

function drawGoldText(ctx, text, x, y, S) {
  let fs = Math.floor(S * 0.145);
  const font = function(sz) { return '900 ' + sz + 'px "Arial Black", Impact, Arial, sans-serif'; };
  ctx.font = font(fs);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  while (ctx.measureText(text).width > S * 0.97 && fs > 24) {
    fs -= 2;
    ctx.font = font(fs);
  }
  // Outer shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.95)';
  ctx.shadowBlur = fs * 0.15;
  ctx.shadowOffsetX = fs * 0.055;
  ctx.shadowOffsetY = fs * 0.09;
  ctx.lineWidth = fs * 0.22;
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#1a0800';
  ctx.strokeText(text, x, y);
  ctx.restore();
  // Dark brown stroke
  ctx.lineWidth = fs * 0.20;
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#3d1a00';
  ctx.strokeText(text, x, y);
  // Bevel stroke
  ctx.lineWidth = fs * 0.12;
  ctx.strokeStyle = '#7a3800';
  ctx.strokeText(text, x, y);
  // Gold gradient fill
  const g = ctx.createLinearGradient(0, y - fs*0.58, 0, y + fs*0.58);
  g.addColorStop(0.00, '#fff8b0');
  g.addColorStop(0.10, '#ffd700');
  g.addColorStop(0.30, '#f0a010');
  g.addColorStop(0.55, '#ffc500');
  g.addColorStop(0.78, '#c07800');
  g.addColorStop(1.00, '#6a3a00');
  ctx.fillStyle = g;
  ctx.fillText(text, x, y);
  // Top highlight
  const hi = ctx.createLinearGradient(0, y - fs*0.58, 0, y - fs*0.05);
  hi.addColorStop(0, 'rgba(255,255,200,0.65)');
  hi.addColorStop(1, 'rgba(255,255,200,0)');
  ctx.fillStyle = hi;
  ctx.fillText(text, x, y);
  return fs;
}

function drawSubtitle(ctx, text, x, y, S) {
  const fs = S * 0.037;
  ctx.save();
  ctx.font = '500 ' + fs + 'px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  ctx.fillStyle = '#fff';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function loadImg(b64, mime) {
  return new Promise(function(res, rej) {
    const img = new Image();
    img.onload = function() { res(img); };
    img.onerror = rej;
    img.src = 'data:' + mime + ';base64,' + b64;
  });
}

// ── Main generate ─────────────────────────────────────────
async function generate() {
  const jinText = document.getElementById('jinText').value.trim().toUpperCase();
  if (!jinText || !charB64) return;

  document.getElementById('btnGen').disabled = true;
  document.getElementById('resultWrap').style.display = 'none';
  setProgress(8, '🎨 Gemini にキャラクター抽出＋Tポーズ化を依頼中...');

  const prompt = 'This image contains a character (anime, illustration, photo, game art, etc.) possibly with a background.\n\n' +
    'Task:\n' +
    '1. Identify the MAIN CHARACTER.\n' +
    '2. Remove ALL background completely — output ONLY the character on a pure white background.\n' +
    '3. Redraw the character in a FULL-BODY T-POSE: standing straight, both arms stretched horizontally outward (like letter T), facing front.\n' +
    '4. Preserve the character exact appearance: clothing, hair, colors, art style.\n' +
    '5. Character should be TALL and CENTERED, filling most of the vertical space, full body from head to feet visible.\n' +
    'Output: single character on WHITE background only, T-pose, full body.';

  let outB64 = charB64, outMime = charMime;

  try {
    setProgress(20, '🤖 Gemini 処理中... (10〜30秒かかります)');
    const resp = await callGemini(prompt, charB64, charMime);
    const parts = (resp.candidates && resp.candidates[0] && resp.candidates[0].content && resp.candidates[0].content.parts) || [];
    const imgPart = parts.find(function(p) { return p.inline_data && p.inline_data.mime_type && p.inline_data.mime_type.startsWith('image/'); });
    if (imgPart) {
      outB64  = imgPart.inline_data.data;
      outMime = imgPart.inline_data.mime_type;
      setProgress(65, '✅ キャラクター変換完了！合成中...');
    } else {
      setProgress(65, '⚠️ 変換できませんでした。元画像で合成します...');
    }
  } catch(e) {
    setProgress(65, '⚠️ ' + e.message.slice(0, 60) + '。元画像で合成...');
  }

  setProgress(75, '🖼️ 合成中...');
  const S = 1024;
  const cv = document.getElementById('canvas');
  cv.width = S; cv.height = S;
  const ctx = cv.getContext('2d');
  const barH = Math.round(S * 0.192);
  const innerY = barH;
  const innerH = S - barH * 2;

  drawBg(ctx, S);

  // Draw character
  try {
    const img = await loadImg(outB64, outMime);
    const charH = innerH * 0.92;
    const charW = img.width * (charH / img.height);
    const charX = (S - charW) / 2;
    const charY = innerY + innerH * 0.02;
    ctx.drawImage(img, charX, charY, charW, charH);
  } catch(e) { /* skip */ }

  // Text (on top of character)
  drawGoldText(ctx, 'キミは' + jinText + 'JIN', S/2, S*0.598, S);
  drawSubtitle(ctx, 'キミは' + jinText + 'JIN？', S/2, S*0.768, S);

  setProgress(100, '🎉 完成！');
  document.getElementById('resultWrap').style.display = 'block';
  document.getElementById('btnGen').disabled = false;
}

function dlImage() {
  const jin = document.getElementById('jinText').value.trim().toUpperCase() || 'JIN';
  const a = document.createElement('a');
  a.download = 'kimi_wa_' + jin + 'JIN.png';
  a.href = document.getElementById('canvas').toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
